<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionFlow — Вход</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #f7f8fa; color: #333;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    background: #fff; border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px; width: 360px; max-width: 90vw;
  }
  .login-card h1 {
    font-size: 20px; font-weight: 600; color: #1a365d;
    margin-bottom: 6px;
  }
  .login-card .sub { font-size: 13px; color: #888; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 12px; font-weight: 500;
    color: #666; margin-bottom: 5px;
  }
  .field input {
    width: 100%; padding: 10px 12px; border: 1px solid #e2e5e9;
    border-radius: 8px; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: #2563eb; }
  .btn {
    width: 100%; padding: 11px; border: none; border-radius: 8px;
    background: #1a365d; color: #fff; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.2s; margin-top: 8px;
  }
  .btn:hover { background: #2563eb; }
  .error {
    background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
    border-radius: 8px; padding: 8px 12px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="login-card">
  <h1>VisionFlow</h1>
  <div class="sub">Communication Intelligence</div>
  <div class="error" id="error">Неверный логин или пароль</div>
  <form method="POST" action="/login">
    <div class="field">
      <label>Логин</label>
      <input type="text" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Войти</button>
  </form>
</div>
<script>
  if (location.search.includes('error=1')) {
    document.getElementById('error').classList.add('show');
  }
</script>
</body>
</html>
