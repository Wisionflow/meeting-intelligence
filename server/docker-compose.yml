services:
  meetings:
    container_name: algora_cmo_meetings
    build: .
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./prompts:/app/prompts
      - ./templates:/app/templates
      - whisper-models:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  whisper-models:
