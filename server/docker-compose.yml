services:
  meetings:
    container_name: algora_cmo_meetings
    build: .
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./prompts:/app/prompts
      - ./templates:/app/templates
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
