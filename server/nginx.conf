# VisionFlow Meeting Intelligence — nginx reverse proxy
# Place in: /etc/nginx/sites-available/meetings.algora.media
# Symlink: ln -s /etc/nginx/sites-available/meetings.algora.media /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name meetings.algora.media;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name meetings.algora.media;

    ssl_certificate /etc/letsencrypt/live/meetings.algora.media/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meetings.algora.media/privkey.pem;

    # CRITICAL: Allow large audio uploads (500 MB)
    client_max_body_size 500M;

    # Timeouts for long transcription requests
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;

    # SSE support (chat endpoint)
    proxy_buffering off;
    proxy_cache off;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE headers
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # Error pages — never show raw errors to client
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Cache busting — static assets with hash
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:8080;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
